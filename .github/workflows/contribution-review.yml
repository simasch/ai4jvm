name: Contribution Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  review:
    # Only run when a maintainer comments "/review" on a PR
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/review') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Get PR details
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          echo "head_sha=$(echo "$PR_JSON" | jq -r '.head.sha')" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(echo "$PR_JSON" | jq -r '.base.ref')" >> "$GITHUB_OUTPUT"

      - name: Checkout main (trusted code)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.base_ref }}
          fetch-depth: 0

      - name: Fetch PR head
        run: git fetch origin ${{ steps.pr.outputs.head_sha }}

      - name: Run contribution review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAINTAINER_PAT: ${{ secrets.MAINTAINER_PAT }}
          GITHUB_MODELS_ORG: ${{ vars.GITHUB_MODELS_ORG }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: bash .github/scripts/contribution-review.sh
